# Orquestación del Sistema Taller AEG
#
# Uso (desde esta carpeta "docker/"):
#   docker compose up -d --build
#   docker compose logs -f
#   docker compose down
#
# El frontend queda expuesto en el puerto 4000 del host. Desde la IP pública
# de la máquina virtual: http://<IP_PUBLICA>:4000
# El backend NO se expone al host: solo es accesible dentro de la red de Docker;
# el frontend (nginx) hace proxy de /api hacia él.

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: talleraeg-backend
    restart: unless-stopped
    environment:
      PORT: 4000
      # CAMBIA este secreto en producción.
      JWT_SECRET: ${JWT_SECRET:-cambia-este-secreto-en-produccion}
      JWT_EXPIRES: ${JWT_EXPIRES:-8h}
      # Sin CORS: el navegador habla con nginx (mismo origen), no directo al backend.
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      # Persisten los "datos" JSON y las imágenes subidas entre reinicios.
      - backend_data:/app/src/data
      - backend_uploads:/app/uploads
    networks:
      - talleraeg
    expose:
      - "4000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: talleraeg-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # host:contenedor  -> accesible en http://<IP_PUBLICA>:4000
      - "4000:80"
    networks:
      - talleraeg

networks:
  talleraeg:
    driver: bridge

volumes:
  backend_data:
  backend_uploads:
