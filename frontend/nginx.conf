server {
    listen 80;
    server_name _;

    # Tamaño máximo de subida (imágenes de artículos)
    client_max_body_size 20m;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy de la API y los uploads hacia el backend (misma red de Docker).
    # El navegador siempre habla con este nginx (mismo origen) -> sin CORS.
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: cualquier ruta desconocida cae en index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
